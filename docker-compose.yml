services:

    php:
        build: .
        volumes:
            - .:/var/www/html
        depends_on:
            - database

    nginx:
        image: nginx:alpine
        ports:
            - "8080:80"
        volumes:
            - .:/var/www/html
            - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
        depends_on:
            - php

    database:
        image: mysql:8.0
        environment:
            MYSQL_ROOT_PASSWORD: root
            MYSQL_DATABASE: vite_gourmand
            MYSQL_USER: symfony
            MYSQL_PASSWORD: symfony
        ports:
            - "3307:3306"
        volumes:
            - db_data:/var/lib/mysql

    mailer:
        image: mailhog/mailhog
        ports:
            - "8025:8025"
            - "1025:1025"

volumes:
    db_data:
