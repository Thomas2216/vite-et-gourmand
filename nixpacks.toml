[phases.setup]
nixPkgs = ["php83", "php83Packages.composer", "autoconf", "gcc", "gnumake", "pcre"]

[phases.install]
cmds = [
    "pecl install mongodb",
    "echo 'extension=mongodb.so' >> $(php --ini | grep 'Loaded Configuration' | sed -e 's/.*://;s/ //g')",
    "composer install --optimize-autoloader --no-scripts --no-interaction"
]

[start]
cmd = "php -S 0.0.0.0:$PORT -t public/"
