[phases.install]
cmds = ["composer install --optimize-autoloader --no-scripts --no-interaction --ignore-platform-req=ext-mongodb"]

[phases.build]
cmds = ["php bin/console cache:warmup --env=prod 2>/dev/null || true"]

[start]
cmd = "php bin/console doctrine:migrations:migrate --no-interaction && php -S 0.0.0.0:$PORT -t public/"
